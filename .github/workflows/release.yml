name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )

          mkdir -p dist
          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "${platform}"
            package="terraform-cmdb_${version}_${goos}_${goarch}"
            mkdir -p "dist/${package}"

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w" -o "dist/${package}/terraform-cmdb" .

            tar -C "dist/${package}" -czf "dist/${package}.tar.gz" terraform-cmdb
            rm -rf "dist/${package}"
          done

          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
